<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player 2.0</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0e0c09;
      --surface:   #16130e;
      --surface2:  #1e1a13;
      --gold:      #c9a84c;
      --gold-dim:  #8a6f32;
      --cream:     #e8dfc8;
      --muted:     #6b6254;
      --border:    #2a2318;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      cursor: crosshair;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 999;
    }
    .wrapper { max-width: 780px; margin: 0 auto; padding: 60px 40px; position: relative; }
    header { margin-bottom: 64px; animation: fadeDown 1s ease both; }
    .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 700;
      line-height: 0.95;
      color: var(--cream);
      letter-spacing: -0.02em;
    }
    h1 em { font-style: italic; color: var(--gold); }
    .tagline {
      margin-top: 16px;
      font-size: 15px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.05em;
      border-left: 1px solid var(--gold-dim);
      padding-left: 14px;
    }
    .divider { display: flex; align-items: center; gap: 16px; margin: 32px 0; }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }
    .divider-symbol { font-family: 'Playfair Display', serif; color: var(--gold-dim); font-size: 18px; }
    .search-wrap {
      display: flex;
      margin-bottom: 48px;
      animation: fadeUp 1s 0.2s ease both;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .search-wrap:focus-within { border-color: var(--gold-dim); }
    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 16px 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      color: var(--cream);
      letter-spacing: 0.02em;
    }
    input[type="text"]::placeholder { color: var(--muted); font-style: italic; }
    button {
      background: var(--gold);
      color: var(--bg);
      border: none;
      padding: 16px 28px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: crosshair;
      transition: background 0.2s;
    }
    button:hover { background: var(--cream); }
    #status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 24px;
      min-height: 18px;
    }
    #songs { display: flex; flex-direction: column; gap: 2px; }
    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 24px;
      display: grid;
      grid-template-columns: 32px 52px 1fr auto;
      align-items: center;
      gap: 16px;
      transition: background 0.2s, border-color 0.2s;
      animation: fadeUp 0.4s ease both;
      cursor: crosshair;
    }
    .song-card:hover { background: var(--surface2); border-color: var(--gold-dim); }
    .song-card:hover .song-num { color: var(--gold); }
    .song-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }
    .song-artwork { width: 48px; height: 48px; object-fit: cover; border: 1px solid var(--border); }
    .song-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--cream);
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .song-meta { font-size: 13px; font-weight: 300; color: var(--muted); letter-spacing: 0.04em; }
    .song-year {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--gold-dim);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
    .song-card:nth-child(1) { animation-delay: 0.00s; }
    .song-card:nth-child(2) { animation-delay: 0.07s; }
    .song-card:nth-child(3) { animation-delay: 0.14s; }
    .song-card:nth-child(4) { animation-delay: 0.21s; }
    .song-card:nth-child(5) { animation-delay: 0.28s; }
    .song-card:nth-child(6) { animation-delay: 0.35s; }
    .song-card:nth-child(7) { animation-delay: 0.42s; }
    .song-card:nth-child(8) { animation-delay: 0.49s; }
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }
    .hint { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.15em; margin-top: 8px; opacity: 0.6; }

    /* DETAIL PANEL */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .detail-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--gold-dim);
      z-index: 2001;
      padding: 40px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 80vh;
      overflow-y: auto;
    }
    .detail-panel.open {
      transform: translateY(0);
    }
    .detail-header {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 24px;
      align-items: start;
      margin-bottom: 32px;
    }
    .detail-artwork {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .detail-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .detail-artist {
      font-size: 16px;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .detail-album {
      font-size: 14px;
      color: var(--muted);
    }
    .close-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      cursor: crosshair;
      transition: all 0.2s;
    }
    .close-btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
      background: transparent;
    }
    .detail-divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }
    .detail-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .meta-item {}
    .meta-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .meta-value {
      font-size: 16px;
      color: var(--cream);
    }
    .coming-soon {
      margin-top: 32px;
      padding: 20px;
      border: 1px dashed var(--border);
      text-align: center;
    }
    .coming-soon-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .coming-soon-text {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="label">Est. 2025 — Song Intelligence</div>
      <h1>Music<br><em>Player 2.0</em></h1>
      <p class="tagline">Search any song. Discover chords. Play anything.</p>
    </header>

    <div class="divider"><span class="divider-symbol">✦</span></div>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Enter a song or artist…" />
      <button onclick="searchSongs()">Search</button>
    </div>
    <p class="hint">— press enter or click search</p>

    <div id="status"></div>
    <div id="songs"></div>

    <footer>
      <span>Music Player 2.0</span>
      <span>Powered by iTunes API</span>
    </footer>
  </div>

  <!-- Detail Panel -->
  <div class="overlay" id="overlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <img class="detail-artwork" id="detailArtwork" src="" onerror="this.style.visibility='hidden'" />
      <div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-artist" id="detailArtist"></div>
        <div class="detail-album" id="detailAlbum"></div>
      </div>
      <button class="close-btn" onclick="closeDetail()">✕ Close</button>
    </div>

    <div class="detail-divider"></div>

    <div class="detail-meta-grid">
      <div class="meta-item">
        <div class="meta-label">Year</div>
        <div class="meta-value" id="detailYear"></div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Genre</div>
        <div class="meta-value" id="detailGenre"></div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Duration</div>
        <div class="meta-value" id="detailDuration"></div>
      </div>
    </div>

    <div class="coming-soon">
      <div class="coming-soon-label">Coming Soon</div>
      <div class="coming-soon-text">Chord charts & tabs will appear here — beginner, intermediate & advanced</div>
    </div>
  </div>

  <script>
    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchSongs();
    });

    function openDetail(song) {
        const artwork = song.artworkUrl100 ? song.artworkUrl100.replace('100x100', '600x600') : '';
      const year = song.releaseDate ? song.releaseDate.substring(0, 4) : '—';
      const mins = Math.floor(song.trackTimeMillis / 60000);
      const secs = Math.floor((song.trackTimeMillis % 60000) / 1000).toString().padStart(2, '0');

      document.getElementById('detailArtwork').src = artwork;
      document.getElementById('detailTitle').textContent = song.trackName;
      document.getElementById('detailArtist').textContent = song.artistName;
      document.getElementById('detailAlbum').textContent = song.collectionName || '—';
      document.getElementById('detailYear').textContent = year;
      document.getElementById('detailGenre').textContent = song.primaryGenreName || '—';
      document.getElementById('detailDuration').textContent = mins + ':' + secs;

      document.getElementById('overlay').classList.add('open');
      document.getElementById('detailPanel').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('detailPanel').classList.remove('open');
    }

    async function searchSongs() {
      const query = document.getElementById('searchInput').value.trim();
      const status = document.getElementById('status');
      const songsDiv = document.getElementById('songs');

      if (!query) {
        status.textContent = '— please enter a song or artist name';
        return;
      }

      status.textContent = '— searching the archive…';
      songsDiv.innerHTML = '';

      try {
        const response = await fetch(
          "https://itunes.apple.com/search?term=" +
          encodeURIComponent(query) +
          "&entity=song&limit=8"
        );
        const data = await response.json();

        if (data.resultCount === 0) {
          status.textContent = '— no results found for "' + query + '"';
          return;
        }

        status.textContent = '— ' + data.resultCount + ' records found';

        data.results.forEach(function(song, index) {
          const year = song.releaseDate ? song.releaseDate.substring(0, 4) : '—';
          const num = String(index + 1).padStart(2, '0');
          const artwork = song.artworkUrl100 || '';

          const card = document.createElement('div');
          card.className = 'song-card';
          card.addEventListener('click', function() {
            openDetail(song);
          });
          card.innerHTML = `
            <span class="song-num">${num}</span>
            <img class="song-artwork" src="${artwork}" onerror="this.style.visibility='hidden'" />
            <div class="song-info">
              <div class="song-title">${song.trackName}</div>
              <div class="song-meta">${song.artistName} &nbsp;·&nbsp; ${song.collectionName || '—'}</div>
            </div>
            <span class="song-year">${year}</span>
          `;
          songsDiv.appendChild(card);
        });

      } catch (error) {
        status.textContent = '— connection error: ' + error.message;
      }
    }
  </script>
</body>
</html>
